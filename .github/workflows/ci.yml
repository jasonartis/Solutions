name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No `version` input: the action reads packageManager from package.json.
      # Specifying both makes the action fail immediately.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Safeguard (docs/12): destructive SQL in a migration fails CI unless it
      # carries an explicit founder-approval marker. Advisory rules rot;
      # mechanical ones don't.
      - name: Block unapproved destructive migrations
        run: |
          bad=$(grep -rilE 'drop[[:space:]]+table|truncate[[:space:]]|drop[[:space:]]+schema' supabase/migrations/ | xargs -r grep -Li 'DESTRUCTIVE-CHANGE-APPROVED' || true)
          if [ -n "$bad" ]; then
            echo "Destructive SQL without the DESTRUCTIVE-CHANGE-APPROVED marker:"
            echo "$bad"
            exit 1
          fi

      # Safeguard (docs/12): applied migrations are history — append a new
      # file, never edit an old one (silent local/prod divergence otherwise).
      - name: Block edits to existing migrations
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: |
          git fetch --depth=2 origin ${{ github.event.before }} || true
          modified=$(git diff --diff-filter=MD --name-only ${{ github.event.before }} ${{ github.sha }} -- supabase/migrations/ || true)
          if [ -n "$modified" ]; then
            echo "Existing migrations were modified or deleted (append-only!):"
            echo "$modified"
            exit 1
          fi

      # Safeguard (docs/12): the test-count ratchet. A session that deletes
      # tests to get green trips this; raising the floor is a deliberate act.
      - name: Test-count ratchet
        run: |
          e2e=$(grep -c "^test(" apps/web/e2e/platform.spec.ts)
          rls=$(grep -c "it(" packages/db/src/rls.test.ts)
          floor_e2e=$(node -p "require('./tests-floor.json').e2e")
          floor_rls=$(node -p "require('./tests-floor.json').rls")
          echo "e2e $e2e (floor $floor_e2e) · rls $rls (floor $floor_rls)"
          if [ "$e2e" -lt "$floor_e2e" ] || [ "$rls" -lt "$floor_rls" ]; then
            echo "Test count fell below the recorded floor (tests-floor.json)."
            echo "Deleting tests to get green is never the fix. If a removal is truly intended, the founder approves lowering the floor."
            exit 1
          fi

      - run: pnpm typecheck

      # Supabase must be up BEFORE build: Next.js prerenders pages at build
      # time, which executes the Supabase client setup and needs real env vars.
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start

      - name: Export Supabase env
        run: |
          eval "$(supabase status -o env | grep -E '^(API_URL|ANON_KEY|SERVICE_ROLE_KEY|DB_URL)=')"
          {
            echo "SUPABASE_URL=$API_URL"
            echo "SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
            echo "DATABASE_URL=$DB_URL"
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
          } >> "$GITHUB_ENV"

      - run: pnpm build

      - run: pnpm seed

      - run: pnpm --filter @platform/db test

      # Browser e2e against the production build (playwright.config.ts starts
      # `next start` itself when CI=true; the build above produced it).
      - run: pnpm --filter web exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

  deploy:
    # Production deploy to Vercel — runs only on master pushes, after checks pass.
    # Built on the runner (prebuilt deploy) so Vercel never builds from source.
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: check
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm dlx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - run: pnpm dlx vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - run: pnpm dlx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

