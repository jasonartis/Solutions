name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No `version` input: the action reads packageManager from package.json.
      # Specifying both makes the action fail immediately.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      # Supabase must be up BEFORE build: Next.js prerenders pages at build
      # time, which executes the Supabase client setup and needs real env vars.
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start

      - name: Export Supabase env
        run: |
          eval "$(supabase status -o env | grep -E '^(API_URL|ANON_KEY|SERVICE_ROLE_KEY|DB_URL)=')"
          {
            echo "SUPABASE_URL=$API_URL"
            echo "SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
            echo "DATABASE_URL=$DB_URL"
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
          } >> "$GITHUB_ENV"

      - run: pnpm build

      - run: pnpm seed

      - run: pnpm --filter @platform/db test

# Deploy jobs (migrate prod + Vercel) are added when cloud accounts exist —
# see docs/07-account-setup.md.
