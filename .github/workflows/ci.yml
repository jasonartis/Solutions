name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm build

      # RLS isolation tests against a real local Supabase stack
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start
      - name: Write env for seed and tests
        run: |
          supabase status -o env | grep -E '^(API_URL|ANON_KEY|SERVICE_ROLE_KEY|DB_URL)=' > /tmp/sb.env
          echo "SUPABASE_URL=$(grep '^API_URL=' /tmp/sb.env | cut -d= -f2- | tr -d '\"')" >> $GITHUB_ENV
          echo "SUPABASE_ANON_KEY=$(grep '^ANON_KEY=' /tmp/sb.env | cut -d= -f2- | tr -d '\"')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(grep '^SERVICE_ROLE_KEY=' /tmp/sb.env | cut -d= -f2- | tr -d '\"')" >> $GITHUB_ENV
      - run: pnpm seed
      - run: pnpm --filter @platform/db test

# Deploy jobs (migrate prod + Vercel) are added when cloud accounts exist —
# see docs/07-account-setup.md.
